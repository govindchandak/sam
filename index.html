<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    
    <!-- Basic -->
    <title>Aniva | Intelligent Software Asset Management Platform</title>
    <meta name="description" content="Aniva helps enterprises reduce software licensing costs, eliminate audit risks, and achieve 100% compliance with real-time SAM intelligence." />
    <meta name="author" content="Anup Tiwari" />
    <meta name="robots" content="index, follow" />

    <!-- Favicon -->
    <link rel="apple-touch-icon" sizes="180x180" href="/favicon_io-aniva/apple-touch-icon.png" />
    <link rel="icon" type="image/png" sizes="192x192" href="/favicon_io-aniva/android-chrome-192x192.png" />
    <link rel="icon" type="image/png" sizes="32x32" href="/favicon_io-aniva/favicon-32x32.png" />
    <link rel="shortcut icon" href="/favicon_io-aniva/favicon.ico" />
    <link rel="icon" type="image/x-icon" href="/favicon_io-aniva/favicon.ico" />
    <link rel="manifest" href="/favicon_io-aniva/site.webmanifest" />

    <!-- Fonts -->
    <link rel="preconnect" href="https://fonts.googleapis.com" />
    <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
    <link href="https://fonts.googleapis.com/css2?family=Space+Grotesk:wght@400;500;600;700&display=swap" rel="stylesheet" />

    <!-- Open Graph / Social Sharing (Critical for LinkedIn, Twitter/X, etc.) -->
    <meta property="og:title" content="Aniva | Intelligent Software Asset Management Platform" />
    <meta property="og:description" content="Reduce licensing costs, eliminate audit penalties, and stay 100% compliant — automatically." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://aniva.io" />
    <meta property="og:image" content="https://aniva.io/og-image.jpg" /> <!-- 1200x630 recommended -->
    <meta property="og:site_name" content="Aniva" />
    <meta property="og:locale" content="en_US" />

    <!-- Twitter / X Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Aniva | Intelligent Software Asset Management Platform" />
    <meta name="twitter:description" content="Reduce licensing costs, eliminate audit penalties, and stay 100% compliant — automatically." />
    <meta name="twitter:image" content="https://aniva.io/og-image.jpg" />
    <meta name="twitter:site" content="@aniva" /> <!-- Change when you have handle -->

    <!-- Theme Color (for mobile browser bar) -->
    <meta name="theme-color" content="#f97316" /> <!-- Orange/amber tone from your brand -->

    <!-- Canonical -->
    <link rel="canonical" href="https://aniva.io" />
  </head>

  <body class="bg-black text-white antialiased">
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
